name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  BUN_VERSION: 1.2.21

jobs:
  predeploy-checks:
    name: Pre-deploy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [predeploy-checks]
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_PROJECT_ID != '' && secrets.VERCEL_ORG_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy with Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(bunx vercel deploy --prod --token="${VERCEL_TOKEN}")
          echo "url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-skipped:
    name: Deployment secrets check
    runs-on: ubuntu-latest
    needs: [predeploy-checks]
    if: ${{ !(secrets.VERCEL_TOKEN != '' && secrets.VERCEL_PROJECT_ID != '' && secrets.VERCEL_ORG_ID != '') }}
    steps:
      - name: Explain missing deployment secrets
        run: |
          echo "Skipping production deployment."
          echo "Set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID repository secrets to enable deployment."
